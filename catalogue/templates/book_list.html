{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'assets/css/book_list.css' %}?v=1">
</head>
<body>
    <h1>لیست محصولات شرکت محصولات</h1>
    <ul>
        {% for Book in Books %}
        <li>
             <h2>{{Book.title}}</h2>
             <img src="{{Book.image1.url}}" alt="{{Book.image1}}">
             <h3>{{Book.author}}</h3>
             <p>{{Book.description}}</p> 
            </li>
        {% endfor %}
    </ul>

</body>
</html>
